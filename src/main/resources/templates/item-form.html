<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Koleksiyona Ürün Ekle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; }
        .navbar { background-color: #487fd0 !important; border-bottom: 2px solid #198754; }
        .form-card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .form-control, .form-select { background-color: #2d2d2d; border: 1px solid #444; color: #fff; }
        .form-control:focus, .form-select:focus { background-color: #333; color: #fff; border-color: #198754; box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25); }
        label { font-weight: 600; color: #bbb; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-5 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/items}">📚 Koleksiyon Ağı</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-3"><a class="btn btn-outline-light btn-sm fw-bold" th:href="@{/users}">👥 Topluluk</a></li>
                <li class="nav-item me-3"><a class="btn btn-success btn-sm fw-bold" th:href="@{/my-collection}">📖 Koleksiyonum</a></li>
                <li class="nav-item me-3" th:if="${currentUser != null and currentUser.role == 'ROLE_ADMIN'}">
                    <a class="btn btn-warning btn-sm fw-bold text-dark" th:href="@{/admin/dashboard}">💰 Kasa</a>
                </li>
                <li class="nav-item"><a class="btn btn-danger btn-sm" th:href="@{'/login?logout'}">Çıkış</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card form-card shadow-lg p-4 mb-5">
                <h3 class="fw-bold text-center mb-4 text-white">✨ Koleksiyonuna Yeni Parça Ekle</h3>

                <form th:action="@{/items/save}" th:object="${itemDTO}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Ürün Adı *</label>
                        <input type="text" class="form-control" th:field="*{name}" required placeholder="Örn: 1960 Rolex Saat">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Kategori *</label>
                        <select class="form-select" th:field="*{type}" required>
                            <option value="Kitap">Kitap</option>
                            <option value="Saat">Saat</option>
                            <option value="Antika">Antika</option>
                            <option value="Sanat">Sanat Eseri</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Açıklama / Hikayesi</label>
                        <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Bu nadide parçanın hikayesi nedir?"></textarea>
                    </div>
                    <div class="mb-4 p-3 rounded" style="background-color: #252525; border: 1px dashed #555;">
                        <label class="form-label text-warning">Satış Fiyatı (İsteğe Bağlı)</label>
                        <small class="d-block text-muted mb-2">Eğer ürünü ileride satmayı düşünüyorsan bir fiyat belirtebilirsin. Şimdilik sadece koleksiyonda duracaksa boş bırak.</small>
                        <input type="number" step="0.01" class="form-control" th:field="*{startingPrice}" placeholder="Örn: 1500.00">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Ürün Görseli Yükle *</label>
                        <input type="file" class="form-control" name="imageFile" required accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2">Koleksiyonuma Ekle</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
