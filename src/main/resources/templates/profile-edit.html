<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profili Düzenle | Koleksiyon Ağı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1e1e1e 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .edit-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            margin: 40px 0;
        }

        .edit-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ff0000;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-label {
            color: #ff8c00;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff !important;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: #ff0000;
            box-shadow: 0 0 0 0.25rem rgba(255, 0, 0, 0.25);
            outline: none;
        }

        .btn-save {
            background-color: #ff0000;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 12px;
            color: #fff;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .btn-cancel {
            color: #ff8c00;
            text-decoration: none;
            font-weight: 600;
            display: block;
            text-align: center;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            color: #ff0000;
        }

        /* Tehlikeli Bölge Stili */
        .danger-zone {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .danger-title {
            color: #ff4d4d;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .btn-delete-account {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-delete-account:hover {
            background: #ff4d4d;
            color: #fff;
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="edit-card shadow-lg">
                <h3 class="edit-title"><i class="bi bi-gear-fill me-2"></i>Profilini Düzenle</h3>

                <form th:action="@{/profile/update}" th:object="${userDTO}" method="post" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label">Profil Fotoğrafı</label>
                        <input type="file" name="profileImageFile" class="form-control">
                        <small class="text-white-50 mt-1 d-block" style="font-size: 0.75rem;">Değiştirmek istemiyorsanız boş bırakın.</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Şehir</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-warning"><i class="bi bi-geo-alt"></i></span>
                            <input type="text" name="city" th:value="${user.city}" class="form-control" placeholder="Yaşadığınız şehir">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Doğum Tarihi</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-warning"><i class="bi bi-calendar-date"></i></span>
                            <input type="date" name="birthDate" th:value="${user.birthDate}" class="form-control">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Biyografi</label>
                        <textarea name="bio" class="form-control" rows="4" th:text="${user.bio}" placeholder="Kendinizden ve koleksiyonlarınızdan bahsedin..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-save w-100">
                        <i class="bi bi-check-circle me-2"></i>Değişiklikleri Kaydet
                    </button>

                    <a th:href="@{'/profile/' + ${user.username}}" class="btn-cancel">
                        <i class="bi bi-x-circle me-1"></i>Vazgeç ve Geri Dön
                    </a>
                </form>

                <div class="danger-zone">
                    <h5 class="danger-title"><i class="bi bi-exclamation-triangle me-2"></i>Tehlikeli Bölge</h5>
                    <p class="text-white-50 small mb-3">Hesabınızı sildiğinizde tüm koleksiyonunuz ve verileriniz kalıcı olarak yok edilecektir. Bu işlem geri alınamaz.</p>
                    <form th:action="@{/profile/delete}" method="post"
                          onsubmit="return confirm('HESABINIZI SİLMEK İSTEDİĞİNİZE EMİN MİSİNİZ? Bu işlem geri alınamaz ve tüm koleksiyonunuz silinir!');">
                        <button type="submit" class="btn btn-delete-account w-100">
                            Hesabımı Kalıcı Olarak Sil
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
