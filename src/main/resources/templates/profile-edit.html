<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profili Düzenle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; }
        .edit-card { background-color: #487fd0; border: 1px solid #333; border-radius: 20px; padding: 30px; }
        .form-control { background-color: #2d2d2d; border: 1px solid #444; color: #fff; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card edit-card shadow-lg">
                <h3 class="fw-bold text-center mb-4 text-white">⚙️ Profilini Düzenle</h3>
                <form th:action="@{/profile/update}" th:object="${userDTO}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Profil Fotoğrafı</label>
                        <input type="file" name="profileImageFile" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şehir</label>
                        <input type="text" name="city" th:value="${user.city}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Doğum Tarihi</label>
                        <input type="date" name="birthDate" th:value="${user.birthDate}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Biyografi</label>
                        <textarea name="bio" class="form-control" rows="4" th:text="${user.bio}"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">Kaydet</button>
                    <a th:href="@{'/profile/' + ${user.username}}" class="btn btn-link w-100 text-muted">Vazgeç</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
