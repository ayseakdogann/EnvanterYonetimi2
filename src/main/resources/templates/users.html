<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title != null ? title : 'Topluluk'} + ' | Koleksiyon Ağı'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1e1e1e 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            color: #fff;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: 800;
            color: #ff0000 !important;
            letter-spacing: 1px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            transition: all 0.3s ease;
            text-align: center;
            padding: 30px;
        }

        .user-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff0000;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .profile-img-circle {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 3px solid #ff0000;
            padding: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .default-avatar-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff0000 0%, #b30000 100%);
            font-size: 32px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .page-title {
            color: #ff8c00;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 40px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username-link {
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
        }

        .username-link:hover {
            color: #ff8c00;
        }

        .btn-profile-view {
            background: transparent;
            border: 2px solid #ff0000;
            color: #ff0000;
            font-weight: 700;
            border-radius: 15px;
            padding: 8px 20px;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-profile-view:hover {
            background: #ff0000;
            color: white;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        .profile-nav-btn {
            color: #ff8c00 !important;
            font-weight: 600;
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4 sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/items}">✨ Koleksiyon Ağı</a>
        <div class="ms-auto d-flex align-items-center">
            <a class="nav-link me-4" style="color: #ff8c00 !important; font-weight: bold;" th:href="@{/my-collection}">
                <i class="bi bi-journal-bookmark-fill"></i> Koleksiyonum
            </a>
            <a th:href="@{'/profile/' + ${currentUser.username}}" class="nav-link text-white profile-nav-btn px-3 me-3">
                <i class="bi bi-person-circle"></i> <span th:text="${currentUser.username}"></span>
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-danger btn-sm rounded-pill px-4">Çıkış</button>
            </form>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <h3 class="page-title">
        <i class="bi bi-people-fill"></i>
        <span th:text="${title != null ? title : 'Koleksiyoncular Topluluğu'}"></span>
    </h3>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="user : ${users}">
            <div class="card h-100 user-card shadow-lg">

                <img th:if="${user.profileImage != null}"
                     th:src="@{'/profile/image/' + ${user.username}}"
                     class="rounded-circle mx-auto mb-3 profile-img-circle">

                <div th:unless="${user.profileImage != null}"
                     class="mx-auto default-avatar-circle rounded-circle d-flex align-items-center justify-content-center mb-3 fw-bold">
                    <span th:text="${user.username.substring(0,1).toUpperCase()}"></span>
                </div>

                <h5 class="mb-1">
                    <a th:href="@{'/profile/' + ${user.username}}"
                       th:text="${user.username}"
                       class="username-link"></a>
                </h5>
                <p class="small text-white-50 mb-3">Koleksiyoncu</p>

                <a th:href="@{'/profile/' + ${user.username}}" class="btn btn-profile-view w-100">Profili Gör</a>
            </div>
        </div>
    </div>

    <div th:if="${users == null or #lists.isEmpty(users)}" class="text-center py-5 opacity-50">
        <i class="bi bi-person-x" style="font-size: 3rem;"></i>
        <p class="mt-3">Görüntülenecek kimse bulunamadı.</p>
    </div>
</div>

</body>
</html>
