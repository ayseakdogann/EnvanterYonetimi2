<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Topluluk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; }
        .navbar { background-color: #487fd0 !important; border-bottom: 2px solid #198754; }
        .user-card { background-color: #487fd0; border: 1px solid #333; border-radius: 20px; transition: 0.3s; }
        .user-card:hover { border-color: #198754; transform: translateY(-5px); }
        .profile-btn { border-radius: 20px; transition: 0.3s; border: 1px solid transparent; }
        .profile-btn:hover { border-color: #198754; background: rgba(25, 135, 84, 0.1); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/items}">📚 Koleksiyon Ağı</a>
        <div class="ms-auto d-flex align-items-center">
            <a class="nav-link text-success fw-bold me-3" th:href="@{/my-collection}">📖 Koleksiyonum</a>
            <a th:href="@{'/profile/' + ${currentUser.username}}" class="nav-link text-white profile-btn px-3 me-2">
                <span class="me-1">👤</span><span th:text="${currentUser.username}"></span>
            </a>
            <a class="btn btn-danger btn-sm" th:href="@{'/login?logout'}">Çıkış</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <h3 class="fw-bold mb-4">👥 Koleksiyoncular Topluluğu</h3>
    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col" th:each="user : ${users}">
            <div class="card h-100 text-center p-4 user-card shadow-lg">
                <img th:if="${user.profileImage != null}" th:src="@{'/profile/image/' + ${user.username}}" class="rounded-circle mx-auto mb-3" style="width: 70px; height: 70px; object-fit: cover;">
                <div th:unless="${user.profileImage != null}" class="mx-auto bg-success text-white rounded-circle d-flex align-items-center justify-content-center mb-3 fw-bold" style="width: 70px; height: 70px; font-size: 28px;">
                    <span th:text="${user.username.substring(0,1).toUpperCase()}"></span>
                </div>
                <h5 class="fw-bold mb-3"><a th:href="@{'/profile/' + ${user.username}}" th:text="${user.username}" class="text-success text-decoration-none"></a></h5>
                <a th:href="@{'/profile/' + ${user.username}}" class="btn btn-sm btn-outline-success w-100 fw-bold">Profili Gör</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
