<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Paneli | Koleksiyon Ağı</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body {
        /* Diğer sayfalarla uyumlu derin radyal degrade */
        background: radial-gradient(circle at center, #1e1e1e 0%, #000000 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
    }

    .admin-card {
        /* Cam efekti (Glassmorphism) */
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(25px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 50px;
        width: 100%;
        max-width: 700px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        text-align: center;
    }

    .admin-title {
        font-size: 2.2rem;
        font-weight: 800;
        color: #ff0000; /* Tematik Kırmızı */
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .admin-subtitle {
        color: #ff8c00; /* Tematik Turuncu */
        font-weight: 300;
        margin-bottom: 40px;
        opacity: 0.8;
    }

    /* Kasa Kartı Tasarımı */
    .vault-box {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 140, 0, 0.3);
        border-radius: 20px;
        padding: 40px;
        transition: transform 0.3s ease;
    }

    .vault-box:hover {
        transform: translateY(-5px);
        border-color: #ff0000;
        background: rgba(255, 0, 0, 0.05);
    }

    .vault-label {
        color: #ff8c00;
        font-size: 1.1rem;
        font-weight: 600;
        text-transform: uppercase;
    }

    .vault-amount {
        font-size: 4rem;
        font-weight: 900;
        background: linear-gradient(to right, #fff, #ff8c00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 15px 0;
    }

    .vault-description {
        color: #aaa;
        font-size: 0.9rem;
        max-width: 400px;
        margin: 0 auto;
    }

    /* Butonlar */
    .btn-back {
        background: transparent;
        border: 2px solid #ff0000;
        color: #ff0000;
        font-weight: 700;
        border-radius: 15px;
        padding: 12px 30px;
        margin-top: 40px;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
    }

    .btn-back:hover {
        background: #ff0000;
        color: white;
        box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
    }

    /* İkonlar için stil */
    .bi-bank {
        font-size: 2.5rem;
        color: #ff0000;
        margin-bottom: 15px;
        display: block;
    }
  </style>
</head>
<body>

<div class="admin-card shadow-lg">
  <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: #ff0000; margin-bottom: 15px; display: block;"></i>
  <h2 class="admin-title">Sistem Yönetici Paneli</h2>
  <p class="admin-subtitle">Platform Gelir ve Finans Takibi</p>

  <div class="vault-box">
    <i class="bi bi-bank"></i>
    <span class="vault-label">Sistem Kasası (Toplam Komisyon)</span>
      <h1 class="vault-amount"
          th:text="${#numbers.formatDecimal(totalCommission != null ? totalCommission : 0, 1, 2)} + ' ₺'">
          0.00 ₺
      </h1>
    <p class="vault-description">
      Platform üzerinden yapılan tüm satışlardan kesilen <strong>%10'luk</strong> operasyonel gelirler.
    </p>
  </div>

  <div class="mt-2">
    <a th:href="@{/items}" class="btn-back">
      <i class="bi bi-arrow-left me-2"></i> Envantere Geri Dön
    </a>
  </div>
</div>

</body>
</html>
