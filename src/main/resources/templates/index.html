<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Koleksiyon Ağı | Ana Sayfa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #487fd0 !important; border-bottom: 2px solid #198754; }
        .item-card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; transition: transform 0.3s; color: #fff; }
        .item-card:hover { transform: translateY(-5px); border-color: #198754; box-shadow: 0 10px 20px rgb(72, 127, 208); }
        .item-img { height: 220px; width: 100%; object-fit: contain; background: #000; border-radius: 12px 12px 0 0; }
        .filter-sidebar { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 20px; }
        .profile-btn { border-radius: 20px; transition: 0.3s; border: 1px solid transparent; }
        .profile-btn:hover { border-color: #198754; background: rgba(25, 135, 84, 0.1); }
        .form-control, .form-select { background-color: #2d2d2d; border: 1px solid #444; color: #fff; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/items}">📚 Koleksiyon Ağı</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-2"><a class="nav-link" th:href="@{/users}">👥 Topluluk</a></li>
                <li class="nav-item me-2"><a class="nav-link text-success fw-bold" th:href="@{/my-collection}">📖 Koleksiyonum</a></li>
                <!-- İSTEDİĞİN PROFİL BUTONU -->
                <li class="nav-item me-2" th:if="${currentUser != null}">
                    <a th:href="@{'/profile/' + ${currentUser.username}}" class="nav-link profile-btn px-3">
                        <span class="me-1">👤</span><span th:text="${currentUser.username}"></span>
                    </a>
                </li>
                <li class="nav-item"><a class="btn btn-danger btn-sm" th:href="@{'/login?logout'}">Çıkış</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="filter-sidebar sticky-top" style="top: 20px;">
                <h5 class="fw-bold mb-3 border-bottom border-secondary pb-2 text-white">Filtrele</h5>
                <form th:action="@{/items}" method="get">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Arama</label>
                        <input type="text" name="search" class="form-control form-control-sm" placeholder="Ürün adı...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Kategori</label>
                        <select name="category" class="form-select form-select-sm">
                            <option value="">Tümü</option>
                            <option value="Kitap">Kitap</option>
                            <option value="Saat">Saat</option>
                            <option value="Antika">Antika</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm w-100 fw-bold">Uygula</button>
                </form>
            </div>
        </div>

        <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-2">
                <h3 class="fw-bold text-white m-0">Pazar Yeri</h3>
                <a th:href="@{/items/add}" class="btn btn-outline-success fw-bold btn-sm">+ Koleksiyona Ekle</a>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                <div class="col" th:each="item : ${items}">
                    <div class="card h-100 item-card">
                        <img th:src="@{'/items/image/' + ${item.id}}" class="item-img">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title text-truncate" th:text="${item.name}"></h5>
                            <span class="badge bg-secondary mb-2" style="width: fit-content;" th:text="${item.type}"></span>
                            <div class="mt-auto pt-3 border-top border-secondary">
                                <div class="p-2 rounded text-center bg-dark">
                                    <span class="fs-5 fw-bold text-success" th:text="${item.startingPrice != null ? item.startingPrice + ' ₺' : 'Teklif Yok'}"></span>
                                </div>
                                <a th:href="@{'/items/' + ${item.id}}" class="btn btn-success w-100 mt-2 fw-bold">İncele</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
