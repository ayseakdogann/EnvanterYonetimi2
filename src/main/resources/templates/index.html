<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Koleksiyon Ağı | Ana Sayfa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1e1e1e 0%, #000000 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        /* Navbar: Şeffaf ve Buzlu */
        .navbar {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: 800;
            color: #ff0000 !important;
            letter-spacing: 1px;
        }

        /* Kart Tasarımları: Glassmorphism */
        .item-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: all 0.3s ease;
            color: #fff;
            overflow: hidden;
        }

        .item-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: #ff0000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .item-img {
            height: 220px;
            width: 100%;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Yan Panel (Sidebar) */
        .filter-sidebar {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
        }

        .sidebar-title {
            color: #ff0000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- OKUNABİLİRLİK VE DROPDOWN DÜZENLEMELERİ --- */
        .form-label {
    color: #ffffff !important;
    font-weight: 600;
}

        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #fff !important;
        }

        /* Paylaştığın görseldeki gibi açılır liste (option) tasarımı */
        .form-select option {
            background-color: #1a1a1a !important; /* Koyu arka plan */
            color: #fff !important; /* Beyaz yazı */
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.12) !important;
            border-color: #ff0000 !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 0, 0, 0.25) !important;
        }

        /* Butonlar */
        .btn-success {
            background-color: #ff0000 !important;
            border: none !important;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-success:hover {
            background-color: #cc0000 !important;
            transform: scale(1.02);
        }

        .btn-outline-success {
            border: 2px solid #ff0000 !important;
            color: #ff0000 !important;
            font-weight: 700;
        }

        .btn-outline-success:hover {
            background-color: #ff0000 !important;
            color: #fff !important;
        }

        .price-tag {
            background: rgba(255, 140, 0, 0.1);
            color: #ff8c00;
            border: 1px solid rgba(255, 140, 0, 0.3);
            font-weight: 800;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/items}">✨ Koleksiyon Ağı</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-2"><a class="nav-link text-light" th:href="@{/users}"><i class="bi bi-people-fill"></i> Topluluk</a></li>
                <li class="nav-item me-3" th:if="${currentUser.role != 'ROLE_ADMIN'}">
                    <a class="nav-link" style="color: #ff8c00 !important; font-weight: bold;" th:href="@{/my-collection}">
                        <i class="bi bi-journal-bookmark-fill"></i> Koleksiyonum
                    </a>
                </li>

                <li class="nav-item me-3" th:if="${currentUser != null and currentUser.role != 'ROLE_ADMIN'}">
                    <a th:href="@{'/profile/' + ${currentUser.username}}" class="nav-link profile-btn px-3" style="color: #ff8c00; border: 1px solid rgba(255,140,0,0.3); border-radius: 15px;">
                        <i class="bi bi-person-circle"></i> <span th:text="${currentUser.username}"></span>
                    </a>
                </li>
                <li class="nav-item me-3" th:if="${currentUser != null and currentUser.role == 'ROLE_ADMIN'}">
                    <a class="btn btn-warning btn-sm rounded-pill px-4" th:href="@{/admin/dashboard}" style="font-weight: bold;">
                        <i class="bi bi-safe2-fill"></i> Sistem Kasası
                    </a>
                </li>
                <li class="nav-item"><a class="btn btn-danger btn-sm rounded-pill px-4" th:href="@{'/login?logout'}">Çıkış</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row">
        <!-- Filtreleme Sidebar -->
        <div class="col-md-3 mb-4">
            <div class="filter-sidebar sticky-top" style="top: 20px;">
                <h5 class="sidebar-title mb-3 border-bottom border-secondary pb-2">Filtrele</h5>
                <form th:action="@{/items}" method="get">
                    <div class="mb-3">
                        <label class="form-label small">Arama</label>
                        <input type="text" id="searchInput" name="search" class="form-control form-control-sm" placeholder="Ürün adı...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Kategori</label>
                        <select name="category" class="form-select form-select-sm">
                            <option value="">Tümü</option>
                            <option value="Kitap">Kitap</option>
                            <option value="Lego">Lego</option>
                            <option value="Ayakkabı">Ayakkabı</option>
                            <option value="Pul">Pul</option>
                            <option value="Plak">Plak</option>
                            <option value="Antika">Antika</option>
                            <option value="Sanat Eseri">Sanat Eseri</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm w-100 mt-2">Uygula</button>
                </form>
            </div>
        </div>

        <!-- Pazar Yeri İçerik -->
        <div class="col-md-9">
            <div class="mb-4 border-bottom border-secondary pb-2">
                <h3 class="fw-bold m-0" style="color: #ff8c00;">Pazar Yeri</h3>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                <div class="col item-box" th:each="item : ${items}">
                    <div class="card h-100 item-card">
                        <div class="position-relative">
                            <span th:if="${item.sold}" class="badge bg-danger position-absolute top-0 start-0 m-3 shadow"
                                  style="font-size: 1rem; padding: 8px 15px; border-radius: 8px; z-index: 2; letter-spacing: 1px;">
                                SATILDI
                            </span>
                            <img th:if="${item.image != null}" th:src="@{'/items/image/' + ${item.id}}"
                                 class="card-img-top" alt="Ürün Resmi" style="height: 250px; object-fit: cover;">

                            <div th:unless="${item.image != null}" class="card-img-top d-flex align-items-center justify-content-center bg-secondary" style="height: 250px;">
                                <i class="bi bi-image text-white fs-1"></i>
                            </div>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title text-truncate fw-bold" th:text="${item.name}"></h5>
                            <span class="badge mb-3" style="background: rgba(255,0,0,0.2); color: #ff4d4d; width: fit-content;" th:text="${item.type}"></span>

                            <div class="mt-auto pt-3 border-top border-secondary">
                                <div class="p-2 rounded text-center price-tag">
                                    <span class="fs-5" th:text="${item.startingPrice != null ? item.startingPrice + ' ₺' : 'Teklif Yok'}"></span>
                                </div>
                                <a th:href="@{'/items/' + ${item.id}}" class="btn btn-success w-100 mt-2">İncele</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('searchInput');
        const items = document.querySelectorAll('.item-box');

        searchInput.addEventListener('input', function() {
            // Kullanıcının yazdığı metni küçük harfe çevir (büyük/küçük harf duyarlılığını kaldırmak için)
            const searchText = this.value.toLowerCase().trim();

            items.forEach(function(item) {
                // Ürün başlığını yakala
                const titleElement = item.querySelector('.card-title');

                if (titleElement) {
                    const titleText = titleElement.textContent.toLowerCase();

                    // includes() metodu metnin içinde geçiyorsa gösterir.
                    if (titleText.includes(searchText)) {
                        item.style.display = ''; // Eşleşiyorsa göster
                    } else {
                        item.style.display = 'none'; // Eşleşmiyorsa tamamen gizle
                    }
                }
            });
        });
    });
</script>
