<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap | Koleksiyon Ağı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgb(72, 127, 208); }
        .form-control { background-color: #2d2d2d; border: 1px solid #444; color: #fff; padding: 12px; }
        .form-control:focus { background-color: #333; color: #fff; border-color: #198754; box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25); }
        .btn-success { background-color: #198754; border: none; padding: 12px; font-weight: bold; }
        .btn-success:hover { background-color: #157347; }
        .brand-logo { font-size: 2rem; font-weight: bold; color: #198754; text-align: center; margin-bottom: 20px; }
        .alert { background-color: rgba(220, 53, 69, 0.1); border-color: #dc3545; color: #ea868f; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">📚 Koleksiyon Ağı</div>
    <h5 class="text-center mb-4">Tekrar Hoş Geldiniz!</h5>

    <!-- Hata Mesajı -->
    <div th:if="${param.error}" class="alert alert-danger text-center small">
        Kullanıcı adı veya şifre hatalı.
    </div>

    <!-- Çıkış Mesajı -->
    <div th:if="${param.logout}" class="alert alert-info text-center small" style="background: rgba(13, 202, 240, 0.1); color: #6edff6; border-color: #0dcaf0;">
        Başarıyla çıkış yapıldı.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label small text-muted">Kullanıcı Adı</label>
            <input type="text" name="username" class="form-control" placeholder="Kullanıcı adınızı girin" required>
        </div>
        <div class="mb-4">
            <label class="form-label small text-muted">Şifre</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Giriş Yap</button>
    </form>

    <div class="mt-4 text-center small">
        <span class="text-muted">Hesabınız yok mu?</span>
        <a th:href="@{/register}" class="text-success fw-bold text-decoration-none">Hemen Kaydolun</a>
    </div>
</div>

</body>
</html>
