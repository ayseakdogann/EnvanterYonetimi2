<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${item.name}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; }
        .navbar { background-color: #1a1a1a !important; border-bottom: 2px solid #198754; }
        .detail-container { background: #1e1e1e; border-radius: 20px; padding: 30px; border: 1px solid #333; }
        .item-full-img { width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgb(72, 127, 208); }
        .desc-text { color: #bbb; line-height: 1.6; }
        .collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-more { color: #198754; cursor: pointer; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/items}">📚 Koleksiyon Ağı</a>
        <div class="ms-auto"><a th:href="@{/items}" class="btn btn-outline-light btn-sm">← Pazara Geri Dön</a></div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row detail-container shadow-lg">
        <div class="col-md-5">
            <img th:src="@{'/items/image/' + ${item.id}}" class="item-full-img" alt="Ürün">
        </div>
        <div class="col-md-7 ps-md-5">
            <h1 class="fw-bold text-white mb-2" th:text="${item.name}"></h1>
            <span class="badge bg-success mb-4" th:text="${item.type}"></span>

            <div class="mb-4">
                <h5 class="text-success fw-bold">Ürün Hikayesi</h5>
                <div id="descContainer" class="desc-text collapsed" th:text="${item.description}"></div>
                <a id="toggleBtn" class="btn-more" onclick="toggleDesc()">Daha Fazla Göster</a>
            </div>

            <div class="p-3 rounded mb-4" style="background: #252525; border-left: 5px solid #198754;">
                <p class="mb-1 text-muted small">Mevcut En Yüksek Teklif</p>
                <h2 class="text-white fw-bold" th:text="${item.currentHighestBid != null ? item.currentHighestBid : item.startingPrice} + ' ₺'"></h2>
            </div>

            <!-- Teklif Formu -->
            <form th:if="${!item.isSold}" th:action="@{'/items/bid/' + ${item.id}}" method="post" class="d-flex gap-2 mb-5">
                <input type="number" name="amount" class="form-control bg-dark text-white border-secondary" placeholder="Teklifinizi yazın..." required>
                <button type="submit" class="btn btn-success px-4 fw-bold">Teklif Ver</button>
            </form>

            <div class="card bg-dark border-secondary p-3 rounded-4">
                <div class="d-flex align-items-center">
                    <div class="bg-success rounded-circle me-3" style="width: 50px; height: 50px;"></div>
                    <div>
                        <a th:href="@{'/profile/' + ${item.owner.username}}" class="text-white fw-bold text-decoration-none" th:text="${item.owner.username}"></a>
                        <p class="text-muted small mb-0" th:text="${item.owner.email}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleDesc() {
        const container = document.getElementById('descContainer');
        const btn = document.getElementById('toggleBtn');
        if (container.classList.contains('collapsed')) {
            container.classList.remove('collapsed');
            btn.innerText = 'Daha Az Göster';
        } else {
            container.classList.add('collapsed');
            btn.innerText = 'Daha Fazla Göster';
        }
    }
</script>
</body>
</html>
