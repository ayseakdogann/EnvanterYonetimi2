<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Koleksiyonum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; }
        .navbar { background-color: #487fd0 !important; border-bottom: 2px solid #198754; }
        .collection-card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .item-img { height: 250px; width: 100%; object-fit: contain; background: #487fd0; }
        .profile-btn { border-radius: 20px; transition: 0.3s; border: 1px solid transparent; }
        .profile-btn:hover { border-color: #198754; background: rgba(25, 135, 84, 0.1); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/items}">📚 Koleksiyon Ağı</a>
        <div class="ms-auto d-flex align-items-center">
            <a class="nav-link text-light me-3" th:href="@{/users}">👥 Topluluk</a>
            <a th:href="@{'/profile/' + ${currentUser.username}}" class="nav-link text-white profile-btn px-3 me-2">
                <span class="me-1">👤</span><span th:text="${currentUser.username}"></span>
            </a>
            <a class="btn btn-danger btn-sm" th:href="@{'/login?logout'}">Çıkış</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-white">✨ Benim Hazinem</h2>
        <a th:href="@{/items/add}" class="btn btn-success fw-bold">+ Yeni Parça Ekle</a>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="item : ${items}">
            <div class="card h-100 collection-card shadow-lg">
                <img th:src="@{'/items/image/' + ${item.id}}" class="item-img">
                <div class="card-body d-flex flex-column">
                    <h5 class="fw-bold text-white" th:text="${item.name}"></h5>
                    <p class="text-muted small" th:text="${item.description}"></p>
                    <div class="mt-auto">
                        <form th:if="${!item.forSale}" th:action="@{'/items/list-for-sale/' + ${item.id}}" method="post">
                            <button type="submit" class="btn btn-primary w-100 fw-bold">🚀 Pazara Çıkar ve Sat</button>
                        </form>
                        <a th:if="${item.forSale}" th:href="@{'/items/' + ${item.id}}" class="btn btn-outline-info w-100">İlanı Gör</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
