<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kaydol | Koleksiyon Ağı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { background-color: #ffffff; border: 1px solid #333; border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgb(72, 127, 208); }
        .form-control { background-color: #2d2d2d; border: 1px solid #444; color: #fff; padding: 12px; }
        .form-control:focus { background-color: #333; color: #fff; border-color: #198754; box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25); }
        .btn-success { background-color: #198754; border: none; padding: 12px; font-weight: bold; }
        .brand-logo { font-size: 1.8rem; font-weight: bold; color: #198754; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="register-card">
    <div class="brand-logo">✨ Koleksiyon Ağı</div>
    <h5 class="text-center mb-4">Aramıza Katılın</h5>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label small text-muted">Kullanıcı Adı</label>
            <input type="text" name="username" class="form-control" placeholder="Benzersiz bir kullanıcı adı" required>
        </div>
        <div class="mb-3">
            <label class="form-label small text-muted">E-posta</label>
            <input type="email" name="email" class="form-control" placeholder="ornek@mail.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label small text-muted">Şifre</label>
            <input type="password" name="password" class="form-control" placeholder="Güçlü bir şifre oluşturun" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Hesabı Oluştur</button>
    </form>

    <div class="mt-4 text-center small">
        <span class="text-muted">Zaten üye misiniz?</span>
        <a th:href="@{/login}" class="text-success fw-bold text-decoration-none">Giriş Yap</a>
    </div>
</div>

</body>
</html>
