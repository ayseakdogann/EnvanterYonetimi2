<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kaydol | Koleksiyon Ağı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Giriş ekranındaki resmi kullanıyoruz */
            background-image: url('/arkaplan.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Sayfa üzerine karartma katmanı */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        .register-card {
            /* Cam efekti tasarımı */
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #ffffff;
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff0000; /* Giriş ekranıyla aynı kırmızı */
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .join-text {
            color: #ff8c00; /* Turuncu alt başlık */
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 300;
            opacity: 0.9;
        }

        .form-label {
            color: #ff8c00; /* Turuncu etiketler */
            font-weight: 500;
            opacity: 0.8;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff !important;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 140, 0, 0.4);
        }

        /* Otomatik doldurma (autofill) ve Focus (Tıklama) Düzeltmeleri */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-background-clip: text;
            -webkit-text-fill-color: #ffffff !important;
            transition: background-color 5000s ease-in-out 0;
            box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.1) inset;
        }

        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.2) !important;
            color: #fff !important;
            border-color: #ff0000 !important;
            box-shadow: 0 0 0 0.25rem rgba(255, 0, 0, 0.25) !important;
            outline: none;
        }

        .btn-register {
            background-color: #ff0000;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 12px;
            margin-top: 10px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .btn-register:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .text-muted {
            color: #ff8c00 !important;
            opacity: 0.7;
        }

        .text-login {
            color: #ff0000 !important;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="brand-logo">✨ Koleksiyon Ağı</div>
    <h5 class="join-text">Aramıza Katılın</h5>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label small">Kullanıcı Adı</label>
            <input type="text" name="username" class="form-control" placeholder="Benzersiz bir kullanıcı adı" required>
        </div>
        <div class="mb-3">
            <label class="form-label small">E-posta</label>
            <input type="email" name="email" class="form-control" placeholder="ornek@mail.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label small">Şifre</label>
            <input type="password" name="password" class="form-control" placeholder="Güçlü bir şifre oluşturun" required>
        </div>
        <button type="submit" class="btn btn-register w-100 shadow-sm">Hesabı Oluştur</button>
    </form>

    <div class="mt-4 text-center small">
        <span class="text-muted">Zaten üye misiniz?</span>
        <a th:href="@{/login}" class="text-login fw-bold text-decoration-none">Giriş Yap</a>
    </div>
</div>

</body>
</html>
