<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.username} + ' Profili'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #487fd0; color: #e0e0e0; }
        .navbar { background-color: #487fd0 !important; border-bottom: 2px solid #198754; }
        .profile-header { background: #487fd0; border-radius: 20px; border: 1px solid #333; padding: 40px; position: relative; }
        .profile-img { width: 150px; height: 150px; object-fit: cover; border: 4px solid #198754; }
        .info-badge { background: #2d2d2d; border-radius: 10px; padding: 5px 15px; margin-right: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/items}">📚 Koleksiyon Ağı</a>
        <div class="ms-auto d-flex align-items-center">
            <a class="nav-link text-light me-3" th:href="@{/users}">👥 Topluluk</a>
            <a th:href="@{/items}" class="btn btn-outline-light btn-sm me-2">Pazara Dön</a>
            <a class="btn btn-danger btn-sm" th:href="@{'/login?logout'}">Çıkış</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="profile-header shadow-lg mb-5">
        <div class="row align-items-center">
            <div class="col-md-3 text-center">
                <img th:if="${user.profileImage != null}" th:src="@{'/profile/image/' + ${user.username}}" class="profile-img rounded-circle mb-3">
                <div th:unless="${user.profileImage != null}" class="mx-auto bg-success text-white rounded-circle d-flex align-items-center justify-content-center mb-3 fw-bold" style="width: 150px; height: 150px; font-size: 60px;">
                    <span th:text="${user.username.substring(0,1).toUpperCase()}"></span>
                </div>
            </div>
            <div class="col-md-6">
                <h1 class="fw-bold text-white mb-2" th:text="${user.username}"></h1>
                <div class="mb-3">
                    <span th:if="${user.city}" class="info-badge">📍 <span th:text="${user.city}"></span></span>
                    <span th:if="${user.birthDate}" class="info-badge">🎂 <span th:text="${user.birthDate}"></span></span>
                </div>
                <p class="text-muted italic" th:text="${user.bio != null ? user.bio : 'Henüz bir biyografi eklenmemiş.'}"></p>
                <div class="d-flex gap-4 mt-3">
                    <span><strong class="text-white" th:text="${user.followers.size()}"></strong> Takipçi</span>
                    <span><strong class="text-white" th:text="${user.following.size()}"></strong> Takip</span>
                </div>
            </div>
            <div class="col-md-3 text-md-end">
                <a th:if="${currentUser.id == user.id}" th:href="@{/profile/edit}" class="btn btn-outline-success w-100 mb-2 fw-bold">⚙️ Profili Düzenle</a>
                <form th:if="${currentUser.id != user.id}" th:action="@{'/follow/' + ${user.username}}" method="post">
                    <button type="submit" th:class="${isFollowing ? 'btn btn-outline-secondary w-100' : 'btn btn-success w-100 fw-bold'}"
                            th:text="${isFollowing ? 'Takibi Bırak' : 'Takip Et'}"></button>
                </form>
            </div>
        </div>
    </div>

    <h4 class="fw-bold text-white mb-4 border-bottom border-secondary pb-2">🖼️ Koleksiyon Sergisi</h4>
    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col" th:each="item : ${items}">
            <div class="card bg-dark border-secondary h-100 shadow-sm overflow-hidden" style="border-radius: 15px;">
                <img th:src="@{'/items/image/' + ${item.id}}" class="card-img-top" style="height: 180px; object-fit: contain; background: #000;">
                <div class="card-body p-2 text-center">
                    <a th:href="@{'/items/' + ${item.id}}" class="text-white text-decoration-none small" th:text="${item.name}"></a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
